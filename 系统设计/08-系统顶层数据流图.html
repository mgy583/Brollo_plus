<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图4-1 系统顶层数据流图</title>
  <style>
    body{margin:0;padding:24px;background:#fff;font-family:"SimSun","Songti SC","Times New Roman",serif;color:#111}
    .page{max-width:1200px;margin:0 auto}
    h1{font-size:24px;text-align:center;margin:0 0 10px;font-weight:700}
    .desc{font-size:14px;line-height:1.8;text-indent:2em;margin:0 0 12px}
    .figure-title,.figure-note{text-align:center;font-size:14px;line-height:1.8}
    .figure-title{margin-top:10px;font-weight:700}
    .figure-note{margin-top:4px;color:#333}
    svg{width:100%;height:auto;border:1px solid #bbb;background:#fff}
    .boundary{fill:none;stroke:#666;stroke-width:1.5;stroke-dasharray:8 5}
    .box{fill:#fff;stroke:#333;stroke-width:1.5;rx:8;ry:8}
    .store{fill:#f7f7f7;stroke:#333;stroke-width:1.5;rx:4;ry:4}
    .main{fill:#eef4ff;stroke:#2f5fa7;stroke-width:1.8;rx:10;ry:10}
    .line{stroke:#333;stroke-width:1.5;fill:none;marker-end:url(#arrow)}
    .dash{stroke:#555;stroke-width:1.4;fill:none;stroke-dasharray:7 4;marker-end:url(#arrow)}
    .title{font-size:20px;font-weight:700;fill:#111}
    .label{font-size:13px;fill:#111;text-anchor:middle}
    .node{font-size:14px;font-weight:700;fill:#111;text-anchor:middle}
    .small{font-size:12px;fill:#222;text-anchor:middle}
  </style>
</head>
<body>
  <div class="page">
    <h1>4.1 系统顶层数据流图</h1>
    <p class="desc">顶层数据流图用于描述本系统与外部实体、核心处理过程以及主要数据存储之间的总体信息交换关系。图中突出用户、管理员、外部行情接口与记账系统之间的数据流向，可用于说明系统的总体边界与输入输出结构。</p>
    <svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
        </marker>
      </defs>
      <text x="600" y="44" class="title" text-anchor="middle">Brollo_plus 顶层数据流图</text>
      <rect x="190" y="90" width="810" height="530" class="boundary"/>
      <text x="595" y="116" class="label">系统边界：Brollo_plus 个人记账与资产管理系统</text>
      <rect x="40" y="180" width="110" height="66" class="box"/>
      <text x="95" y="208" class="node">用户</text>
      <text x="95" y="229" class="small">登录、记账、查询</text>
      <rect x="40" y="420" width="110" height="66" class="box"/>
      <text x="95" y="448" class="node">管理员</text>
      <text x="95" y="469" class="small">配置、监控、审计</text>
      <rect x="1030" y="210" width="130" height="70" class="box"/>
      <text x="1095" y="239" class="node">外部行情 API</text>
      <text x="1095" y="260" class="small">汇率与资产行情</text>
      <rect x="1020" y="440" width="145" height="78" class="box"/>
      <text x="1092" y="470" class="node">消息/通知渠道</text>
      <text x="1092" y="492" class="small">预算告警与事件推送</text>
      <rect x="410" y="190" width="370" height="190" class="main"/>
      <text x="595" y="225" class="node">核心业务系统</text>
      <text x="595" y="250" class="small">认证授权、账户管理、交易管理、预算管理</text>
      <text x="595" y="273" class="small">报表分析、行情估值、家庭协同、系统设置</text>
      <rect x="450" y="305" width="120" height="48" class="box"/>
      <text x="510" y="334" class="node">前端 Web</text>
      <rect x="620" y="305" width="110" height="48" class="box"/>
      <text x="675" y="334" class="node">API 网关</text>
      <rect x="300" y="470" width="150" height="64" class="store"/>
      <text x="375" y="498" class="node">PostgreSQL</text>
      <text x="375" y="519" class="small">用户认证数据</text>
      <rect x="485" y="470" width="150" height="64" class="store"/>
      <text x="560" y="498" class="node">MongoDB</text>
      <text x="560" y="519" class="small">账户/交易/预算</text>
      <rect x="670" y="470" width="150" height="64" class="store"/>
      <text x="745" y="498" class="node">Redis</text>
      <text x="745" y="519" class="small">缓存与会话</text>
      <rect x="855" y="470" width="150" height="64" class="store"/>
      <text x="930" y="498" class="node">TimescaleDB</text>
      <text x="930" y="519" class="small">预算/行情时序</text>
      <path d="M150 205 L410 205" class="line"/>
      <text x="280" y="192" class="label">登录信息、记账请求、查询条件</text>
      <path d="M410 245 L150 245" class="line"/>
      <text x="280" y="264" class="label">认证结果、账务明细、统计结果</text>
      <path d="M150 453 L410 453" class="dash"/>
      <text x="280" y="440" class="label">系统配置、监控查询、审计需求</text>
      <path d="M780 240 L1030 240" class="line"/>
      <text x="905" y="226" class="label">行情拉取请求</text>
      <path d="M1030 270 L780 270" class="line"/>
      <text x="905" y="290" class="label">汇率与资产行情数据</text>
      <path d="M780 450 C900 450,940 475,1020 475" class="dash"/>
      <text x="900" y="436" class="label">预算超限通知、事件消息</text>
      <path d="M525 380 L375 470" class="line"/>
      <text x="430" y="414" class="label">用户数据读写</text>
      <path d="M585 380 L560 470" class="line"/>
      <text x="615" y="430" class="label">业务数据存取</text>
      <path d="M650 380 L745 470" class="dash"/>
      <text x="717" y="418" class="label">缓存/Token/热点数据</text>
      <path d="M720 380 L930 470" class="line"/>
      <text x="835" y="414" class="label">预算历史与行情时序</text>
    </svg>
    <div class="figure-title">图4-1 系统顶层数据流图</div>
    <div class="figure-note">注：该图从系统整体视角描述外部实体、核心业务系统与主要数据存储之间的数据交换关系。</div>
  </div>
</body>
</html>
