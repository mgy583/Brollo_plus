<h1>4.5 新增交易业务时序图</h1>
<p class="desc">时序图用于描述系统在某一具体业务场景中的动态交互过程。这里选取“新增交易并联动预算更新”作为典型流程，展示用户、前端页面、API 客户端、网关、交易服务、预算服务以及数据库之间的调用顺序与信息传递机制。</p>

<line x1="105" y1="138" x2="105" y2="910" class="life"/><line x1="285" y1="138" x2="285" y2="910" class="life"/><line x1="475" y1="138" x2="475" y2="910" class="life"/><line x1="680" y1="138" x2="680" y2="910" class="life"/><line x1="915" y1="138" x2="915" y2="910" class="life"/><line x1="1145" y1="138" x2="1145" y2="910" class="life"/><line x1="1305" y1="138" x2="1305" y2="910" class="life"/>
