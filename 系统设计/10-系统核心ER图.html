<h1>4.3 系统核心实体关系图</h1>
<p class="desc">实体关系图用于描述本系统数据库中核心实体及其联系。根据数据库设计文档，系统的主要实体包括用户、账户、交易、分类、预算以及行情历史等对象。其中，交易实体处于业务核心位置，它与账户、分类、用户和预算等实体均存在直接或间接联系。</p>
