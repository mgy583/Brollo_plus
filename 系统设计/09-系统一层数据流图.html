<h1>4.2 系统一层数据流图</h1>
<p class="desc">在顶层数据流图的基础上，进一步将核心业务系统分解为认证与用户管理、账户管理、交易管理、预算管理、报表分析、行情服务以及通知协同等主要处理过程。该图能够清晰展示各功能过程与数据存储之间的读写关系，以及交易事件驱动预算与报表更新的内部机制。</p>

<text x="700" y="40" class="title" text-anchor="middle">Brollo_plus 一层数据流图</text>
<rect x="30" y="70" width="1340" height="810" class="boundary"/>
<text x="700" y="95" class="label">系统边界与主要处理过程分解</text>
<rect x="50" y="180" width="110" height="64" class="box"/><text x="105" y="208" class="node">用户</text><text x="105" y="229" class="small">终端操作者</text>
<rect x="1240" y="180" width="120" height="64" class="box"/><text x="1300" y="208" class="node">外部行情源</text><text x="1300" y="229" class="small">第三方接口</text>

<rect x="470" y="140" width="210" height="84" class="main"/><text x="575" y="172" class="node">2.0 账户管理</text><text x="575" y="194" class="small">账户 CRUD、余额维护、多币种</text>
<rect x="730" y="140" width="210" height="84" class="main"/><text x="835" y="172" class="node">3.0 交易管理</text><text x="835" y="194" class="small">录入、查询、删除、分类、去重</text>
<rect x="990" y="140" width="180" height="84" class="main"/><text x="1080" y="172" class="node">4.0 行情服务</text><text x="1080" y="194" class="small">汇率获取与资产估值</text>
<rect x="350" y="370" width="210" height="84" class="main"/><text x="455" y="402" class="node">5.0 预算管理</text><text x="455" y="424" class="small">预算设定、监控、预警</text>
