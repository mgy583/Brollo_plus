<div class="page">
<h1>4.6 新增交易业务流程图</h1>
<p class="desc">流程图用于描述新增交易业务在系统中的处理步骤及判断逻辑。该图从用户录入信息开始，经过前端校验、后端鉴权和业务规则校验、数据写入以及预算与报表联动更新等环节，完整反映系统处理该业务时的执行路径。</p>
<svg viewBox="0 0 960 1260" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#333"/></marker></defs>
<text x="480" y="40" class="title" text-anchor="middle">新增交易业务流程图</text>
<rect x="350" y="90" width="260" height="58" class="term"/><text x="480" y="126" class="node">开始：用户发起新增交易</text>
<rect x="330" y="210" width="300" height="64" class="step"/><text x="480" y="238" class="node">填写交易信息</text><text x="480" y="258" class="small">类型、金额、账户、分类、日期、描述</text>
<rect x="330" y="330" width="300" height="64" class="step"/><text x="480" y="358" class="node">前端表单校验</text><text x="480" y="378" class="small">必填项、金额大于零、日期合法</text>
<polygon points="480,450 620,530 480,610 340,530" class="decision"/><text x="480" y="525" class="node">校验是否通过？</text><text x="480" y="546" class="small">输入合法性判断</text>
<rect x="700" y="500" width="190" height="64" class="step"/><text x="795" y="528" class="node">提示错误信息</text><text x="795" y="548" class="small">用户修改后重试</text>
<rect x="330" y="660" width="300" height="64" class="step"/><text x="480" y="688" class="node">发送 API 请求</text><text x="480" y="708" class="small">POST /api/v1/transactions</text>
<rect x="330" y="780" width="300" height="64" class="step"/><text x="480" y="808" class="node">后端鉴权与业务校验</text><text x="480" y="828" class="small">JWT、账户归属、分类有效性、去重检查</text>
<polygon points="480,900 620,980 480,1060 340,980" class="decision"/><text x="480" y="975" class="node">后端处理成功？</text><text x="480" y="996" class="small">数据写入与规则检查</text>
<rect x="90" y="948" width="190" height="64" class="step"/><text x="185" y="976" class="node">返回失败响应</text><text x="185" y="996" class="small">未授权、冲突或参数错误</text>
<rect x="330" y="1110" width="300" height="64" class="step"/><text x="480" y="1138" class="node">更新预算与报表</text><text x="480" y="1158" class="small">异步事件驱动预算进度与统计更新</text>
<rect x="350" y="1200" width="260" height="58" class="term"/><text x="480" y="1236" class="node">结束：返回成功并刷新界面</text>
<line x1="480" y1="148" x2="480" y2="210" class="line"/><line x1="480" y1="274" x2="480" y2="330" class="line"/><line x1="480" y1="394" x2="480" y2="450" class="line"/><line x1="620" y1="530" x2="700" y2="530" class="line"/><text x="660" y="516" class="label">否</text><path d="M795 564 L795 620 L480 620 L480 660" class="dash"/><text x="642" y="608" class="label">修改后重新提交</text><line x1="480" y1="610" x2="480" y2="660" class="line"/><text x="505" y="640" class="label">是</text><line x1="480" y1="724" x2="480" y2="780" class="line"/><line x1="480" y1="844" x2="480" y2="900" class="line"/><line x1="340" y1="980" x2="280" y2="980" class="line"/><text x="310" y="965" class="label">否</text><path d="M185 1012 L185 1085 L480 1085 L480 1200" class="dash"/><text x="330" y="1074" class="label">前端提示错误后结束</text><line x1="480" y1="1060" x2="480" y2="1110" class="line"/><text x="505" y="1088" class="label">是</text><line x1="480" y1="1174" x2="480" y2="1200" class="line"/>
</svg>
<div class="figure-title">图4-6 新增交易业务流程图</div>
<div class="figure-note">注：圆角矩形表示开始或结束，矩形表示处理步骤，菱形表示条件判断，箭头表示控制流程方向。</div>
