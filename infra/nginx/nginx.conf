worker_processes auto;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  upstream user_service       { server user-service:8001; }
  upstream account_service    { server account-service:8002; }
  upstream transaction_service { server transaction-service:8003; }
  upstream budget_service     { server budget-service:8004; }
  upstream report_service     { server report-service:8005; }
  upstream quote_service      { server quote-service:8006; }

  server {
    listen 8000;

    location = /health {
      add_header Content-Type application/json;
      return 200 '{"status":"healthy"}';
    }

    location ^~ /api/v1/families {
      proxy_pass http://user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location ^~ /api/v1/auth {
      proxy_pass http://user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location ^~ /api/v1/users {
      proxy_pass http://user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location ^~ /api/v1/accounts {
      proxy_pass http://account_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location ^~ /api/v1/categories {
      proxy_pass http://account_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location ^~ /api/v1/transactions {
      proxy_pass http://transaction_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location ^~ /api/v1/budgets {
      proxy_pass http://budget_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location ^~ /api/v1/reports {
      proxy_pass http://report_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location ^~ /api/v1/quotes {
      proxy_pass http://quote_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }
  }
}
